<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Dubhe on Sui Architecture Overview</title>
  <desc id="desc">Layered architecture and write/read data flow for Dubhe on Sui.</desc>
  <defs>
    <style>
      .title { font: 700 34px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .label { font: 600 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 15px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .chip { font: 600 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #1d4ed8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#f8fafc" />
  <text x="50" y="60" class="title">Dubhe Engine on Sui: Layered Architecture</text>
  <text x="50" y="92" class="subtitle">On-chain correctness and off-chain developer velocity are intentionally decoupled</text>

  <rect x="50" y="130" width="620" height="105" rx="14" fill="#dbeafe" stroke="#93c5fd" />
  <text x="72" y="165" class="label">Application Layer</text>
  <text x="72" y="195" class="text">dApps, bots, backend services, game clients</text>
  <text x="72" y="218" class="text">Built on SDK calls and indexed data</text>

  <rect x="50" y="250" width="620" height="120" rx="14" fill="#e0f2fe" stroke="#7dd3fc" />
  <text x="72" y="285" class="label">Off-chain Engineering Layer</text>
  <text x="72" y="315" class="text">CLI workflows, indexer + GraphQL, client/react SDK</text>
  <text x="72" y="338" class="text">Handles delivery, observability, and read scalability</text>

  <rect x="50" y="385" width="620" height="130" rx="14" fill="#ecfccb" stroke="#bef264" />
  <text x="72" y="420" class="label">On-chain Layer (Sui Move)</text>
  <text x="72" y="450" class="text">Generated resources, system modules, shared framework contracts</text>
  <text x="72" y="473" class="text">State transitions and deterministic business logic</text>

  <rect x="50" y="530" width="620" height="105" rx="14" fill="#fae8ff" stroke="#d8b4fe" />
  <text x="72" y="565" class="label">Sui Runtime Layer</text>
  <text x="72" y="595" class="text">Consensus, execution, object storage</text>
  <text x="72" y="618" class="text">Finality and object-level security model</text>

  <line x1="360" y1="235" x2="360" y2="248" stroke="#64748b" stroke-width="3" marker-end="url(#arrowGray)" />
  <line x1="360" y1="370" x2="360" y2="383" stroke="#64748b" stroke-width="3" marker-end="url(#arrowGray)" />
  <line x1="360" y1="515" x2="360" y2="528" stroke="#64748b" stroke-width="3" marker-end="url(#arrowGray)" />

  <rect x="730" y="140" width="420" height="250" rx="16" fill="#ffffff" stroke="#cbd5e1" />
  <text x="754" y="175" class="label">Write Path</text>
  <text x="754" y="208" class="text">1. App/Client builds transaction</text>
  <text x="754" y="236" class="text">2. Transaction calls system module</text>
  <text x="754" y="264" class="text">3. System reads/writes resources</text>
  <text x="754" y="292" class="text">4. Storage/event records emitted</text>
  <line x1="742" y1="214" x2="1118" y2="214" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="742" y1="242" x2="1118" y2="242" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="742" y1="270" x2="1118" y2="270" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)" />

  <rect x="730" y="410" width="420" height="225" rx="16" fill="#ffffff" stroke="#cbd5e1" />
  <text x="754" y="445" class="label">Read Path</text>
  <text x="754" y="478" class="text">1. Indexer ingests checkpoints/events</text>
  <text x="754" y="506" class="text">2. Data served via GraphQL/SDK APIs</text>
  <text x="754" y="534" class="text">3. App renders and subscribes to updates</text>
  <line x1="742" y1="484" x2="1118" y2="484" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="742" y1="512" x2="1118" y2="512" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)" />

  <rect x="50" y="678" width="1100" height="46" rx="10" fill="#eff6ff" stroke="#bfdbfe" />
  <text x="72" y="707" class="chip">Design principle: codegen standardizes storage access, while indexing/query layers scale reads independently.</text>
</svg>
