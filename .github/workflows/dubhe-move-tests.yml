name: Dubhe Move Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'framework/src/dubhe/**'
      - 'packages/sui-cli/**'
      - '.github/workflows/dubhe-move-tests.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SUI_TEST_GAS_LIMIT_FAST: '200000000'
  SUI_TEST_GAS_LIMIT_AUDIT: '500000000'
  SUI_GAS_REGRESSION_THRESHOLD_PCT: '0.1'
  SUI_COVERAGE_THRESHOLD_PCT: '6.5'
  SUI_MAX_FUZZ_FAILURE_RATE_PCT: '0'
  DUBHE_TESTNET_RPC_URL: 'https://fullnode.testnet.sui.io:443'

jobs:
  detect-dubhe-changes:
    name: detect-dubhe-changes
    runs-on: ubuntu-latest
    outputs:
      dubhe_changed: ${{ steps.detect.outputs.dubhe_changed }}
      sui_cli_version: ${{ steps.resolve_sui_version.outputs.sui_cli_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Sui CLI version from Move.toml
        id: resolve_sui_version
        shell: bash
        run: |
          set -euo pipefail
          sui_cli_version="$(sed -n 's/.*rev = "\(mainnet-v[^"]*\)".*/\1/p' framework/src/dubhe/Move.toml | head -n1)"
          if [[ -z "${sui_cli_version}" ]]; then
            echo "Unable to resolve Sui version from framework/src/dubhe/Move.toml"
            exit 1
          fi
          echo "sui_cli_version=${sui_cli_version}" >> "$GITHUB_OUTPUT"

      - name: Detect Dubhe-related changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "dubhe_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          else
            base_sha=""
            head_sha=""
          fi

          if [[ -z "${base_sha}" || -z "${head_sha}" ]]; then
            echo "dubhe_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${base_sha}" =~ ^0+$ ]]; then
            echo "dubhe_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${base_sha}" "${head_sha}" || true)"
          echo "Changed files:"
          echo "${changed_files}"

          if echo "${changed_files}" | grep -Eq '^(framework/src/dubhe/|packages/sui-cli/|\.github/workflows/dubhe-move-tests\.yml$)'; then
            echo "dubhe_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "dubhe_changed=false" >> "$GITHUB_OUTPUT"
          fi

  test-fast:
    name: test-fast (smoke)
    needs: detect-dubhe-changes
    if: needs.detect-dubhe-changes.outputs.dubhe_changed == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pinned Sui CLI
        shell: bash
        env:
          SUI_CLI_VERSION: ${{ needs.detect-dubhe-changes.outputs.sui_cli_version }}
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            arm64|aarch64) arch="arm64" ;;
            x86_64) arch="x86_64" ;;
            *)
              echo "Unsupported macOS arch: $(uname -m)"
              exit 1
              ;;
          esac

          asset="sui-${SUI_CLI_VERSION}-macos-${arch}.tgz"
          url="https://github.com/MystenLabs/sui/releases/download/${SUI_CLI_VERSION}/${asset}"
          dest="${RUNNER_TEMP}/sui-bin"

          curl -fsSL -o "${RUNNER_TEMP}/sui.tgz" "${url}"
          mkdir -p "${dest}"
          tar -xzf "${RUNNER_TEMP}/sui.tgz" -C "${dest}"
          chmod +x "${dest}/sui"
          echo "${dest}" >> "$GITHUB_PATH"

      - name: Print test manifest
        shell: bash
        run: |
          set -euo pipefail
          echo "SUI_CLI_VERSION=${{ needs.detect-dubhe-changes.outputs.sui_cli_version }}"
          sui --version
          grep -n '^Sui = ' framework/src/dubhe/Move.toml || true

      - name: Run test-fast
        working-directory: framework/src/dubhe
        env:
          SUI_TEST_GAS_LIMIT: ${{ env.SUI_TEST_GAS_LIMIT_FAST }}
        shell: bash
        run: |
          set -euo pipefail
          make test-fast | tee "${RUNNER_TEMP}/dubhe-test-fast.log"

      - name: Upload test-fast log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dubhe-test-fast-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/dubhe-test-fast.log
          retention-days: 30
          if-no-files-found: warn

  test-audit:
    name: test-audit (full)
    needs: detect-dubhe-changes
    if: needs.detect-dubhe-changes.outputs.dubhe_changed == 'true'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pinned Sui CLI
        shell: bash
        env:
          SUI_CLI_VERSION: ${{ needs.detect-dubhe-changes.outputs.sui_cli_version }}
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            arm64|aarch64) arch="arm64" ;;
            x86_64) arch="x86_64" ;;
            *)
              echo "Unsupported macOS arch: $(uname -m)"
              exit 1
              ;;
          esac

          asset="sui-${SUI_CLI_VERSION}-macos-${arch}.tgz"
          url="https://github.com/MystenLabs/sui/releases/download/${SUI_CLI_VERSION}/${asset}"
          dest="${RUNNER_TEMP}/sui-bin"

          curl -fsSL -o "${RUNNER_TEMP}/sui.tgz" "${url}"
          mkdir -p "${dest}"
          tar -xzf "${RUNNER_TEMP}/sui.tgz" -C "${dest}"
          chmod +x "${dest}/sui"
          echo "${dest}" >> "$GITHUB_PATH"

      - name: Print test manifest
        shell: bash
        run: |
          set -euo pipefail
          echo "SUI_CLI_VERSION=${{ needs.detect-dubhe-changes.outputs.sui_cli_version }}"
          sui --version
          grep -n '^Sui = ' framework/src/dubhe/Move.toml || true

      - name: Run test-audit
        working-directory: framework/src/dubhe
        env:
          SUI_TEST_GAS_LIMIT: ${{ env.SUI_TEST_GAS_LIMIT_AUDIT }}
        shell: bash
        run: |
          set -euo pipefail
          make test-audit | tee "${RUNNER_TEMP}/dubhe-test-audit.log"

      - name: Run gas regression gate
        working-directory: framework/src/dubhe
        env:
          SUI_TEST_GAS_LIMIT: ${{ env.SUI_TEST_GAS_LIMIT_AUDIT }}
          SUI_GAS_REGRESSION_THRESHOLD_PCT: ${{ env.SUI_GAS_REGRESSION_THRESHOLD_PCT }}
        shell: bash
        run: |
          set -euo pipefail
          make gas-baseline-check | tee "${RUNNER_TEMP}/dubhe-gas-gate.log"

      - name: Run coverage gate
        working-directory: framework/src/dubhe
        env:
          SUI_TEST_GAS_LIMIT: ${{ env.SUI_TEST_GAS_LIMIT_AUDIT }}
          SUI_COVERAGE_THRESHOLD_PCT: ${{ env.SUI_COVERAGE_THRESHOLD_PCT }}
        shell: bash
        run: |
          set -euo pipefail
          make coverage-gate | tee "${RUNNER_TEMP}/dubhe-coverage-gate.log"

      - name: Run fuzz smoke
        working-directory: framework/src/dubhe
        env:
          SUI_TEST_GAS_LIMIT: ${{ env.SUI_TEST_GAS_LIMIT_AUDIT }}
        shell: bash
        run: |
          set -euo pipefail
          make fuzz-smoke | tee "${RUNNER_TEMP}/dubhe-fuzz-smoke.log"

      - name: Run quality trend gate
        working-directory: framework/src/dubhe
        env:
          SUI_GAS_REGRESSION_THRESHOLD_PCT: ${{ env.SUI_GAS_REGRESSION_THRESHOLD_PCT }}
          SUI_COVERAGE_THRESHOLD_PCT: ${{ env.SUI_COVERAGE_THRESHOLD_PCT }}
          SUI_MAX_FUZZ_FAILURE_RATE_PCT: ${{ env.SUI_MAX_FUZZ_FAILURE_RATE_PCT }}
        shell: bash
        run: |
          set -euo pipefail
          make quality-trend QUALITY_LABEL="ci-${{ github.run_id }}-${{ github.run_attempt }}" | tee "${RUNNER_TEMP}/dubhe-quality-trend.log"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install workspace dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Run sui-cli unit and type gates
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @0xobelisk/sui-cli type-check | tee "${RUNNER_TEMP}/dubhe-sui-cli-typecheck.log"
          pnpm --filter @0xobelisk/sui-cli test | tee "${RUNNER_TEMP}/dubhe-sui-cli-test.log"

      - name: Run sui-cli local diagnostics (gas + debug replay)
        working-directory: framework
        shell: bash
        env:
          SUI_TEST_GAS_LIMIT: ${{ env.SUI_TEST_GAS_LIMIT_AUDIT }}
          SUI_GAS_REGRESSION_THRESHOLD_PCT: ${{ env.SUI_GAS_REGRESSION_THRESHOLD_PCT }}
        run: |
          set -euo pipefail
          mkdir -p src/dubhe/.reports/sui-cli

          pnpm exec tsx ../packages/sui-cli/src/dubhe.ts test \
            --config-path dubhe.config.ts \
            --test test_cheatcodes_test \
            --gas-limit "${SUI_TEST_GAS_LIMIT}" \
            --profile-gas \
            --profile-top 20 \
            --profile-module-top 20 \
            --profile-out src/dubhe/.reports/sui-cli/move-gas-profile-cli.json \
            --profile-baseline src/dubhe/.ci/move-gas-baseline.json \
            --profile-threshold-pct "${SUI_GAS_REGRESSION_THRESHOLD_PCT}" \
            --profile-fail-on-regression false \
            --profile-regression-out src/dubhe/.reports/sui-cli/move-gas-regression-cli.json \
            --profile-html-out src/dubhe/.reports/sui-cli/move-gas-profile-cli.html \
            --profile-flamegraph-out src/dubhe/.reports/sui-cli/move-gas-flamegraph-cli.svg \
            --profile-html-title "Dubhe Gas Profile (CLI CI)"

          cat > src/dubhe/.reports/sui-cli/debug-repro-smoke.json <<'EOF'
          {
            "generatedAt": "ci",
            "reproCommand": "sui move test --path src/dubhe --list"
          }
          EOF

          pnpm exec tsx ../packages/sui-cli/src/dubhe.ts debug \
            --replay-artifact src/dubhe/.reports/sui-cli/debug-repro-smoke.json \
            --replay-use-repro true \
            | tee "${RUNNER_TEMP}/dubhe-sui-cli-debug-replay.log"

      - name: Run sui-cli RPC diagnostics (fork + trace, best effort)
        if: always()
        continue-on-error: true
        working-directory: framework
        shell: bash
        env:
          SUI_TEST_GAS_LIMIT: ${{ env.SUI_TEST_GAS_LIMIT_AUDIT }}
          DUBHE_TESTNET_RPC_URL: ${{ env.DUBHE_TESTNET_RPC_URL }}
        run: |
          set -euo pipefail
          report_root="${GITHUB_WORKSPACE}/framework/src/dubhe/.reports/sui-cli"
          mkdir -p "${report_root}"

          pnpm exec tsx ../packages/sui-cli/src/dubhe.ts snapshot \
            --network testnet \
            --rpc-url "${DUBHE_TESTNET_RPC_URL}" \
            --objects-file "${GITHUB_WORKSPACE}/framework/src/dubhe/.ci/fork-objects-testnet.txt" \
            --out "${report_root}/fork-fixture-snapshot.json" \
            --fork-fixture-out "${report_root}/fork-fixture-testnet.json" \
            --fork-name "ci-testnet-core"

          pnpm exec tsx ../packages/sui-cli/src/dubhe.ts test \
            --config-path dubhe.config.ts \
            --test address_test \
            --gas-limit "${SUI_TEST_GAS_LIMIT}" \
            --fork-fixture "${report_root}/fork-fixture-testnet.json" \
            --fork-ignore-objects 0x6 \
            --fork-diff-out "${report_root}/fork-diff.json" \
            --fork-current-snapshot-out "${report_root}/fork-current-snapshot.json" \
            --fork-fail-on-drift false

          latest_checkpoint="$(
            curl -sSf "${DUBHE_TESTNET_RPC_URL}" \
              -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","id":1,"method":"sui_getLatestCheckpointSequenceNumber","params":[]}' \
              | node -e 'const fs=require("fs"); const payload=JSON.parse(fs.readFileSync(0,"utf8")); if(!payload.result){process.exit(1);} process.stdout.write(String(payload.result));'
          )"

          checkpoint_payload="{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"sui_getCheckpoint\",\"params\":[\"${latest_checkpoint}\"]}"
          trace_digest="$(
            curl -sSf "${DUBHE_TESTNET_RPC_URL}" \
              -H 'Content-Type: application/json' \
              -d "${checkpoint_payload}" \
              | node -e 'const fs=require("fs"); const payload=JSON.parse(fs.readFileSync(0,"utf8")); const txs=payload?.result?.transactions; if(!Array.isArray(txs)||txs.length===0){process.exit(1);} process.stdout.write(String(txs[0]));'
          )"

          printf '%s\n' "${trace_digest}" > "${report_root}/trace-digests.txt"
          pnpm exec tsx ../packages/sui-cli/src/dubhe.ts trace \
            --network testnet \
            --rpc-url "${DUBHE_TESTNET_RPC_URL}" \
            --digest-file "${report_root}/trace-digests.txt" \
            --show-inputs \
            --md-out "${report_root}/trace-report.md" \
            --html-out "${report_root}/trace-report.html" \
            --call-graph-out "${report_root}/trace-call-graph.mmd" \
            --report-title "Dubhe Trace Report (CI)" \
            | tee "${RUNNER_TEMP}/dubhe-sui-cli-rpc.log"

      - name: Generate audit report
        if: always()
        working-directory: framework/src/dubhe
        shell: bash
        run: |
          set -euo pipefail
          make audit-report QUALITY_LABEL="ci-${{ github.run_id }}-${{ github.run_attempt }}" | tee "${RUNNER_TEMP}/dubhe-audit-report.log"

      - name: Upload test-audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dubhe-test-audit-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/dubhe-test-audit.log
            ${{ runner.temp }}/dubhe-gas-gate.log
            ${{ runner.temp }}/dubhe-coverage-gate.log
            ${{ runner.temp }}/dubhe-fuzz-smoke.log
            ${{ runner.temp }}/dubhe-quality-trend.log
            ${{ runner.temp }}/dubhe-audit-report.log
            ${{ runner.temp }}/dubhe-sui-cli-typecheck.log
            ${{ runner.temp }}/dubhe-sui-cli-test.log
            ${{ runner.temp }}/dubhe-sui-cli-debug-replay.log
            ${{ runner.temp }}/dubhe-sui-cli-rpc.log
            framework/src/dubhe/traces
            framework/src/dubhe/.reports
            framework/src/dubhe/.ci/move-quality-baseline.json
          retention-days: 30
          if-no-files-found: warn

  skip-no-dubhe-change:
    name: skip-no-dubhe-change
    needs: detect-dubhe-changes
    if: needs.detect-dubhe-changes.outputs.dubhe_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip message
        run: echo "No Dubhe changes detected; Move tests skipped."

  dubhe-move-required:
    name: dubhe-move-required
    needs:
      - detect-dubhe-changes
      - test-fast
      - test-audit
      - skip-no-dubhe-change
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce required gate
        shell: bash
        run: |
          set -euo pipefail
          echo "dubhe_changed=${{ needs.detect-dubhe-changes.outputs.dubhe_changed }}"
          echo "test-fast=${{ needs.test-fast.result }}"
          echo "test-audit=${{ needs.test-audit.result }}"
          echo "skip-no-dubhe-change=${{ needs.skip-no-dubhe-change.result }}"

          if [[ "${{ needs.detect-dubhe-changes.outputs.dubhe_changed }}" == "true" ]]; then
            [[ "${{ needs.test-fast.result }}" == "success" ]] || exit 1
            [[ "${{ needs.test-audit.result }}" == "success" ]] || exit 1
          else
            [[ "${{ needs.skip-no-dubhe-change.result }}" == "success" ]] || exit 1
          fi
