name: Installer Smoke

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'scripts/install.sh'
      - 'scripts/install.ps1'
      - 'scripts/install.cmd'
      - '.github/workflows/installer-smoke.yml'
  workflow_dispatch:

jobs:
  smoke-unix:
    name: smoke-unix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script (dry-run, npm manager)
        shell: bash
        run: |
          bash ./scripts/install.sh --dry-run --manager npm -- --help

      - name: Install script (dry-run with install-deps)
        shell: bash
        run: |
          bash ./scripts/install.sh --dry-run --install-deps --manager auto -- --help

  smoke-windows:
    name: smoke-windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: PowerShell installer (dry-run)
        shell: pwsh
        run: |
          ./scripts/install.ps1 -DryRun -Manager npm -CreateArgs '--help'

      - name: PowerShell installer (dry-run with InstallDeps)
        shell: pwsh
        run: |
          ./scripts/install.ps1 -DryRun -InstallDeps -Manager auto -CreateArgs '--help'

      - name: CMD wrapper installer (dry-run)
        shell: cmd
        run: |
          scripts\install.cmd -DryRun -Manager npm
