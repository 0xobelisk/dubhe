name: Contract Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'framework/**'
      - 'templates/**'
      - 'e2e/**'
      - '.github/workflows/contract-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'framework/**'
      - 'templates/**'
      - 'e2e/**'

env:
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  # ── Job 1: Move unit tests (no localnet needed) ────────────────────────────
  move-unit-tests:
    name: Move Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          echo "📦 Installing Node.js dependencies..."
          pnpm install --frozen-lockfile
          echo "✅ Dependencies installed"

      - name: Build packages
        run: |
          echo "🔨 Building all packages..."
          pnpm build:packages
          echo "✅ Packages built"

      - name: Install Sui CLI
        run: |
          echo "⬇️  Fetching latest Sui CLI version..."
          SUI_VERSION=$(curl -fsSL https://api.github.com/repos/MystenLabs/sui/releases/latest \
            | jq -r '.tag_name')
          echo "📦 Installing Sui CLI ${SUI_VERSION}..."

          ARCHIVE="sui-${SUI_VERSION}-ubuntu-x86_64.tgz"
          curl -fsSL \
            "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/${ARCHIVE}" \
            -o /tmp/sui.tgz

          mkdir -p /tmp/sui-bin
          tar -xzf /tmp/sui.tgz -C /tmp/sui-bin
          # The binary may be directly in the archive or in a subdirectory
          find /tmp/sui-bin -name "sui" -type f -exec sudo mv {} /usr/local/bin/sui \;
          sudo chmod +x /usr/local/bin/sui

          echo "✅ Installed: $(sui --version)"

      - name: Run schemagen + Move unit tests
        working-directory: e2e
        run: |
          echo "🧪 Running schemagen + Move unit tests..."
          pnpm test
          echo "✅ All Move unit tests passed"

  # ── Job 2: Integration tests (localnet required) ───────────────────────────
  # TODO: e2e tests are temporarily disabled due to issues — re-enable when fixed
  integration-tests:
    name: Integration Tests (localnet)
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm build:packages

      - name: Install Sui CLI
        id: install-sui
        run: |
          echo "⬇️  Fetching latest Sui CLI version..."
          SUI_VERSION=$(curl -fsSL https://api.github.com/repos/MystenLabs/sui/releases/latest \
            | jq -r '.tag_name')
          echo "sui_version=${SUI_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Installing Sui CLI ${SUI_VERSION}..."

          ARCHIVE="sui-${SUI_VERSION}-ubuntu-x86_64.tgz"
          curl -fsSL \
            "https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/${ARCHIVE}" \
            -o /tmp/sui.tgz

          mkdir -p /tmp/sui-bin
          tar -xzf /tmp/sui.tgz -C /tmp/sui-bin
          find /tmp/sui-bin -name "sui" -type f -exec sudo mv {} /usr/local/bin/sui \;
          sudo chmod +x /usr/local/bin/sui

          echo "✅ Installed: $(sui --version)"

      - name: Cache Sui CLI binary
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sui
          key: sui-cli-${{ steps.install-sui.outputs.sui_version }}-ubuntu-x86_64

      - name: Initialize Sui configuration
        run: |
          echo "⚙️  Initializing Sui client config..."
          # Create a default keystore and client.yaml for localnet
          mkdir -p ~/.sui/sui_config
          sui client --yes 2>/dev/null || true
          echo "✅ Sui config initialized"

      - name: Start Sui localnet
        run: |
          echo "🚀 Starting Sui localnet with faucet..."
          # Start localnet in background; force-regenesis for a clean state
          sui start --with-faucet --force-regenesis &
          SUI_PID=$!
          echo "SUI_PID=${SUI_PID}" >> $GITHUB_ENV

          echo "⏳ Waiting for localnet to be ready (RPC: http://127.0.0.1:9000)..."
          TIMEOUT=180
          ELAPSED=0
          until curl -sf -X POST http://127.0.0.1:9000 \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","method":"sui_getTotalTransactionBlocks","params":[],"id":1}' \
            > /dev/null 2>&1; do
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "❌ Localnet failed to start within ${TIMEOUT}s"
              exit 1
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          echo "✅ Localnet is ready (${ELAPSED}s elapsed)"

          # Also wait for faucet
          ELAPSED=0
          until curl -sf http://127.0.0.1:9123/gas > /dev/null 2>&1; do
            if [ $ELAPSED -ge 30 ]; then
              echo "⚠️  Faucet may not be ready, continuing anyway"
              break
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done
          echo "✅ Faucet ready"

      - name: Run integration tests
        working-directory: e2e
        run: |
          echo "🧪 Running integration tests against localnet..."
          pnpm test:integration
          echo "✅ Integration tests passed"

      - name: Stop localnet
        if: always()
        run: |
          if [ -n "${SUI_PID}" ]; then
            echo "🛑 Stopping localnet (PID: ${SUI_PID})..."
            kill $SUI_PID 2>/dev/null || true
          fi
          pkill -f "sui start" 2>/dev/null || true
          echo "✅ Localnet stopped"

  # ── Summary ────────────────────────────────────────────────────────────────
  contract-tests-summary:
    name: Contract Tests Summary
    needs: [move-unit-tests, integration-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "📋 Contract Tests Summary:"
          echo "  Move unit tests:    ${{ needs.move-unit-tests.result }}"
          echo "  Integration tests:  ${{ needs.integration-tests.result }}"

          # NOTE: integration-tests is temporarily disabled — re-enable when fixed
          if [[ "${{ needs.move-unit-tests.result }}" == "success" && \
                "${{ needs.integration-tests.result }}" =~ ^(success|skipped)$ ]]; then
            echo "✅ All contract tests passed (or skipped)!"
          else
            echo "❌ Some contract tests failed"
            exit 1
          fi
